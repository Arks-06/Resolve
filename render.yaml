databases:
  - name: resolve-postgres
    databaseName: resolvedb
    user: resolve_user
    plan: free # Change to starter for production

services:
  - type: redis
    name: resolve-redis
    plan: free
    ipAllowList: [] # Keeps Redis strictly on the internal private network

  - type: web
    name: resolve-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: "pip install uv && uv sync"
    startCommand: "uv run uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resolve-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: resolve-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0

  - type: worker
    name: resolve-worker
    env: python
    rootDir: backend
    plan: free
    buildCommand: "pip install uv && uv sync"
    # Windows uses 'celery -A ... worker --pool=solo', but Render runs Linux, so we use standard workers
    startCommand: "uv run celery -A app.queue.celery_app worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resolve-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: resolve-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0